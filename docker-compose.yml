services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-900000}
      - JWT_COOKIE_NAME=${JWT_COOKIE_NAME:-jwt-cookie}
      - JWT_COOKIE_MAX_AGE=${JWT_COOKIE_MAX_AGE:-86400}

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    depends_on:
      - backend

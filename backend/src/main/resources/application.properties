spring.application.name=springintro

# Override with env vars or a local profile; do not commit real credentials.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/urlshortner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HS256 signing key must be Base64 (see JwtServiceImpl). Override JWT_SECRET_KEY in production.
jwt.secret-key=${JWT_SECRET_KEY:VGhpcy1pcy1hLXNob3djYXNlLXNlY3JldC1rZXktZm9yLXNwcmluZ2ludHJvLTIwMjY=}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.cookie-name=${JWT_COOKIE_NAME:jwt-cookie}
jwt.cookie-max-age=${JWT_COOKIE_MAX_AGE:86400}
